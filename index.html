<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transportes Bauducco — Central de Operações</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: #fdfdfd;
      --foreground: #1c1917;
      --primary: #e11d48;
      --primary-foreground: #ffffff;
      --secondary: #f59e0b;
      --secondary-foreground: #78350f;
      --card: #ffffff;
      --card-foreground: #1c1917;
      --muted-foreground: #78716c;
      --accent: #f5f5f4;
      --border: #e7e5e4;
      --shadow-card: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --font-sans: 'Plus Jakarta Sans', sans-serif;
      --success: #16a34a;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: var(--font-sans);
      background-color: var(--background);
      color: var(--foreground);
      line-height: 1.5;
      padding-top: 70px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px;
    }
    
    /* Navbar / Menu Superior */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background-color: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      z-index: 100;
      box-shadow: 0 1px 3px rgb(0 0 0 / 0.05);
    }
    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }
    .brand {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .brand span {
      color: var(--secondary);
    }

    /* Classes de controle de exibição de páginas */
    .page-section {
      display: none;
    }
    .page-section.active {
      display: block;
    }

    /* --- TELA PÚBLICA (VISÃO DO MOTORISTA) --- */
    .hero-section {
      position: relative;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      height: 60vh;
      min-height: 400px;
    }
    .slide-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
    }
    .slide-img.active {
      opacity: 1;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(28,25,23,0.85) 0%, rgba(28,25,23,0.7) 60%, rgba(28,25,23,0.4) 100%);
      z-index: 1;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 20px 0;
    }
    .max-w-xl {
      max-width: 576px;
      color: var(--primary-foreground);
    }
    .badge {
      display: inline-block;
      border-radius: 9999px;
      background-color: var(--secondary);
      color: var(--secondary-foreground);
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.2;
    }
    h1 span.text-secondary {
      color: var(--secondary);
    }
    .hero-p {
      font-size: 1rem;
      opacity: 0.95;
      margin-bottom: 20px;
    }
    .flex-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    /* Botões Otimizados */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-weight: 600;
      padding: 14px 24px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    .btn-sm {
      padding: 10px 18px;
      font-size: 13px;
    }
    .btn-secondary {
      background-color: var(--secondary);
      color: var(--secondary-foreground);
    }
    .btn-secondary:hover {
      background-color: #d97706;
    }
    .btn-primary {
      background-color: var(--primary);
      color: var(--primary-foreground);
    }
    .btn-primary:hover {
      background-color: #be123c;
    }
    .btn-outline-dark {
      border-color: var(--border);
      background-color: transparent;
      color: var(--foreground);
    }
    .btn-outline-dark:hover {
      background-color: var(--accent);
    }
    .btn-danger {
      background-color: #dc2626;
      color: white;
    }

    .slider-dots {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 8px;
    }
    .dot {
      height: 6px;
      border-radius: 9999px;
      background-color: rgba(255, 255, 255, 0.5);
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      width: 12px;
    }
    .dot.active {
      width: 28px;
      background-color: var(--primary-foreground);
    }
    .section-py {
      padding: 40px 0;
    }
    .text-center {
      text-align: center;
      margin-bottom: 24px;
    }
    .text-center h2 {
      font-size: 1.75rem;
      font-weight: 700;
    }
    
    .grid-3 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    
    /* Layout de duas colunas */
    .partner-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }
    
    /* Regras de Carregamento */
    .rules-box {
      background-color: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow-card);
    }
    .rules-box h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--foreground);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .rule-item {
      padding: 10px;
      border-left: 3px solid var(--secondary);
      background-color: rgba(245, 158, 11, 0.03);
      border-radius: 0 8px 8px 0;
      margin-bottom: 10px;
      font-size: 13px;
    }
    .rule-item strong {
      color: var(--secondary-foreground);
      display: block;
      margin-bottom: 2px;
    }

    .card {
      background-color: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow-card);
      text-align: center;
    }
    .clickable-card {
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .clickable-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
    }
    .icon-container {
      margin: 0 auto 12px auto;
      display: inline-flex;
      width: 44px;
      height: 44px;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background-color: var(--accent);
      color: var(--primary);
    }
    .card-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
    }
    .card-desc {
      color: var(--muted-foreground);
      font-size: 13px;
    }

    /* Área do Terminal de Execução do Robô */
    .file-list {
      background: #f9f9f9;
      border-radius: 8px;
      padding: 10px;
      font-size: 0.9rem;
      color: #555;
      max-height: 120px;
      overflow-y: auto;
      border: 1px solid #ddd;
      margin-top: 8px;
    }
    .robot-log {
      background-color: #1e1e1e;
      color: #39ff14;
      font-family: 'Courier New', Courier, monospace;
      padding: 12px;
      border-radius: 8px;
      margin-top: 14px;
      font-size: 12px;
      text-align: left;
      max-height: 160px;
      overflow-y: auto;
    }

    /* --- ESTILOS COMPLEMENTARES DA TABELA DE CONSULTA --- */
    .table-frete select, .table-frete input {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: var(--font-sans);
      outline: none;
      background-color: #fff;
    }
    .table-frete select:focus, .table-frete input:focus {
      border-color: var(--primary);
    }

    /* Listas para Manuais PDF */
    .pdf-list {
      list-style-type: none;
      text-align: left;
    }
    .pdf-item {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
      background-color: var(--card);
    }
    .pdf-info {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .pdf-icon {
      color: var(--primary);
      flex-shrink: 0;
    }

    /* --- RODAPÉ (FOOTER) --- */
    .main-footer {
      background-color: #1c1917;
      color: #f5f5f4;
      padding: 32px 0 16px 0;
      margin-top: auto;
      border-top: 4px solid var(--secondary);
    }
    .footer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 24px;
      margin-bottom: 24px;
    }
    .footer-grid .footer-col h4 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--secondary);
    }
    .footer-col p, .footer-col span {
      font-size: 13px;
      color: #a8a29e;
      margin-bottom: 6px;
    }
    .footer-col a {
      color: #a8a29e;
      text-decoration: none;
      font-size: 13px
